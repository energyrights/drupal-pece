name: CI

on:
  push:
    branches: [2.x]
  pull_request:
    branches: [2.x]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Validate composer.json and check for known security advisories.
  # Fast check — all other jobs depend on this passing first.
  # -----------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, pdo_mysql, opcache
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Validate composer.json
        run: composer validate --no-check-lock

      - name: Security audit
        run: composer audit

  # -----------------------------------------------------------------------
  # Job 2: Full Drupal install using existing config, then verify DB updates
  # and config sync are clean.
  # NOTE: PHPUnit tests require drupal/core-dev in require-dev to provide
  # Drupal's PHPUnit compatibility traits. Add it and re-enable a unit-tests
  # job once custom unit tests exist.
  # -----------------------------------------------------------------------
  install:
    name: Install & Config Sync
    runs-on: ubuntu-latest
    needs: validate

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drupal
          MARIADB_USER: drupal
          MARIADB_PASSWORD: drupal
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, pdo_mysql, opcache
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare settings.php
        run: |
          cp web/sites/default/default.settings.php web/sites/default/settings.php
          chmod 666 web/sites/default/settings.php
          mkdir -p web/sites/default/files
          chmod -R 777 web/sites/default/files
          mkdir -p config/sync
          echo "\$settings['config_sync_directory'] = '$(pwd)/config/sync';" >> web/sites/default/settings.php

      - name: Install PECE profile
        run: |
          vendor/bin/drush si pece \
            --existing-config \
            --db-url=mysql://drupal:drupal@127.0.0.1/drupal \
            --site-name="PECE2" \
            -y

      - name: Run database updates
        run: vendor/bin/drush updb -y

      - name: Verify config is in sync
        run: vendor/bin/drush cst 2>&1 | tee /tmp/cst.txt && [ ! -s /tmp/cst.txt ]

  # -----------------------------------------------------------------------
  # Job 3: Check Drupal coding standards on custom modules.
  # -----------------------------------------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, pdo_mysql, opcache
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check Drupal coding standards
        run: |
          vendor/bin/phpcs --standard=Drupal,DrupalPractice \
            --extensions=php,module,inc,install,test,profile,theme \
            web/profiles/pece/modules/

  # -----------------------------------------------------------------------
  # Job 4: Build the Bulma-based peceful theme to catch compilation errors.
  # -----------------------------------------------------------------------
  theme-build:
    name: Theme Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/themes/custom/peceful/package-lock.json

      - name: Install theme dependencies
        run: npm ci --prefix web/themes/custom/peceful

      - name: Build theme assets
        run: npm run build-bulma --prefix web/themes/custom/peceful
